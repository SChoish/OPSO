# OPSO 기본 설정 (config/default.yaml)
# 사용: from config import get_offline_config, get_online_config

# 공통 (모델 구조)
common:
  hidden_dim: 256
  context_length: 100
  d_model: 128
  d_state: 16
  d_conv: 4
  expand: 2
  n_layers: 2
  drop_p: 0.1

# 오프라인 학습
offline:
  data_source: ogbench   # ogbench | d4rl (D4RL antmaze)
  dataset_name: antmaze-medium-navigate-v0
  max_trajectories: -1
  batch_size: 128
  num_epochs: 1000
  normalize: true
  data_dir: ./datasets
  save_dir: null
  device: cuda
  tau: 0.01
  gamma: 0.99
  encoder_lr: 3.0e-4
  warmup_steps: 1000
  beta_s: 1.0
  beta_r: 1.0
  beta_nce: 0.1
  beta_v: 0.1
  beta_a: 0.1
  use_focal_loss: false
  focal_alpha: 0.25
  focal_gamma: 2.0
  nce_temperature: 0.1
  expectile_tau: 0.3
  memory_bank_size: 10000
  use_bidirectional_nce: true

offline_train:
  save_every: 20
  validate_every: 10

# 온라인 학습 (encoder 고정, latent-space만 학습)
online:
  dataset_name: antmaze-medium-navigate-v0
  max_episodes: 1000
  max_steps_per_episode: 1000
  batch_size: 128
  device: cuda
  offline_checkpoint_path: null
  online_checkpoint_path: null
  save_dir: null
  student_checkpoint_path: null
  gamma: 0.99
  tau: 0.01
  lmbda: 0.1
  warmup_steps: 1000
  expectile_tau: 0.9
  critic_lr: 3.0e-5
  env_lr: 3.0e-4
  adv_weight_temperature: 1.0
  adv_weight_cap: 20.0
