# OPSO 기본 설정 (config/default.yaml)
# OGBench GCIQL/GCIVL/HIQL (control/value) + ODT/RADT/Decision Mamba (sequence encoder) 참고

# 공통 (모델 구조) — sequence-model 문헌
common:
  hidden_dim: 512          # OGBench baseline MLP 폭
  context_length: 20       # ODT/RADT/Decision Mamba
  d_model: 256
  d_state: 16
  d_conv: 4
  expand: 2
  n_layers: 4
  drop_p: 0.1

# 오프라인 학습 — OGBench GCIQL/GCIVL, encoder는 ODT 스타일
offline:
  data_source: ogbench
  dataset_name: antmaze-medium-navigate-v0
  max_trajectories: -1
  batch_size: 256         # Mamba encoder; effective 1024는 gradient accumulation으로
  normalize: true
  data_dir: ./datasets
  save_dir: null
  device: cuda
  tau: 0.005              # GCIQL/GCIVL
  gamma: 0.99              # humanoid는 0.995 override
  encoder_lr: 1.0e-4      # ODT/RADT 쪽 보수적
  warmup_steps: 10000
  expectile_tau: 0.9      # GCIQL/GCIVL
  beta_v: 1.0              # core value loss
  beta_s: 0.25
  beta_r: 0.10
  beta_nce: 0.0            # first strong baseline: aux 최소화
  beta_a: 0.0
  use_focal_loss: false
  focal_alpha: 0.25
  focal_gamma: 2.0
  nce_temperature: 0.1
  memory_bank_size: 0
  use_bidirectional_nce: false

offline_train:
  max_updates: 500000
  validate_every: 20000
  save_every: 50000

# 온라인 — GCIQL actor temp + ODT sequence recipe
online:
  dataset_name: antmaze-medium-navigate-v0
  max_episodes: 1000
  max_steps_per_episode: 1000
  batch_size: 256
  device: cuda
  offline_checkpoint_path: null
  online_checkpoint_path: null
  save_dir: null
  student_checkpoint_path: null
  gamma: 0.99
  tau: 0.005
  critic_lr: 3.0e-4
  env_lr: 1.0e-4          # proposer/inv_dynamics 보수적
  warmup_steps: 1000
  expectile_tau: 0.9
  lmbda: 0.05
  adv_weight_temperature: 3.0   # antmaze navigate/stitch; humanoid 10, explore 30+
  adv_weight_cap: 100.0         # GCIQL clip
