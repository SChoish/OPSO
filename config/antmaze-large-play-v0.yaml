# D4RL antmaze-large-play-v0 (--data d4rl 사용)
# 참고: IQL expectile (iql_tau=0.9, discount=0.99). context_length 50으로 시험, Mamba는 중간 크기.
common:
  hidden_dim: 256
  context_length: 50       # 50으로 시험 (기본 100 대비 빠름)
  d_model: 256             # Mamba latent (128=소, 256=중간, 384+=대)
  d_state: 16
  d_conv: 4
  expand: 2
  n_layers: 4              # Mamba 깊이 (2=얕음, 4=중간)
  drop_p: 0.1

offline:
  dataset_name: antmaze-large-play-v0
  data_source: d4rl
  max_trajectories: -1
  batch_size: 256          # IQL batch_size
  num_epochs: 1000
  normalize: true
  data_dir: ./datasets
  save_dir: null
  device: cuda
  tau: 0.005              # IQL target soft update
  gamma: 0.99              # IQL discount
  encoder_lr: 3.0e-4       # IQL actor_lr / qf_lr / vf_lr
  warmup_steps: 1000
  beta_s: 1.0
  beta_r: 1.0
  beta_nce: 0.1
  beta_v: 0.1
  beta_a: 0.1
  use_focal_loss: false
  focal_alpha: 0.25
  focal_gamma: 2.0
  nce_temperature: 0.1
  expectile_tau: 0.9       # IQL iql_tau (낙관적 V)
  memory_bank_size: 10000
  use_bidirectional_nce: true

offline_train:
  save_every: 20
  validate_every: 10

online:
  dataset_name: antmaze-large-play-v0
  max_episodes: 1000
  max_steps_per_episode: 1000
  batch_size: 256
  device: cuda
  offline_checkpoint_path: null
  online_checkpoint_path: null
  save_dir: null
  student_checkpoint_path: null
  gamma: 0.99
  tau: 0.005               # IQL target update
  lmbda: 0.1
  warmup_steps: 1000
  expectile_tau: 0.9       # IQL iql_tau
  critic_lr: 3.0e-4        # IQL qf_lr
  env_lr: 3.0e-4           # IQL actor_lr
  adv_weight_temperature: 1.0
  adv_weight_cap: 20.0
  # beta: 10.0 (IQL policy extraction) → adv_weight_* 로 조정 가능
